name: Linting

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Linting
      run: make lint
